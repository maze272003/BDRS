x-vite-build-args: &vite-build-args
  - VITE_APP_NAME
  - VITE_REVERB_APP_KEY
  - VITE_REVERB_HOST
  - VITE_REVERB_PORT
  - VITE_REVERB_SCHEME

x-laravel-env: &laravel-env
  - APP_NAME
  - APP_ENV
  - APP_KEY
  - APP_DEBUG
  - APP_URL
  - LOG_CHANNEL
  - LOG_LEVEL
  - DB_CONNECTION
  - DB_HOST
  - DB_PORT
  - DB_DATABASE
  - DB_USERNAME
  - DB_PASSWORD
  - SESSION_DRIVER
  - CACHE_STORE
  - QUEUE_CONNECTION
  - BROADCAST_CONNECTION
  - REVERB_APP_ID
  - REVERB_APP_KEY
  - REVERB_APP_SECRET
  - REVERB_HOST
  - REVERB_PORT
  - REVERB_SCHEME
  - RUN_MIGRATIONS

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args: *vite-build-args
    restart: unless-stopped
    ports:
      - "8000:80"
    environment: *laravel-env
    volumes:
      - storage:/app/storage

  queue:
    build:
      context: .
      dockerfile: Dockerfile
      args: *vite-build-args
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    environment: *laravel-env
    volumes:
      - storage:/app/storage

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
      args: *vite-build-args
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    environment: *laravel-env
    volumes:
      - storage:/app/storage

volumes:
  storage:
